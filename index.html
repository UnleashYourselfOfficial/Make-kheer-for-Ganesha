<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <title>Make Kheer for Ganesha</title>
    <style>
        :root {
            --primary-orange: #ff9933;
            --primary-yellow: #ffcc00;
            --white: #ffffff;
            --text-color: #4a4a4a;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Fredoka One', cursive;
            /* font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; */
            overflow: hidden;
            background-color: #fff9e6;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
        }

        .active {
            display: flex;
        }

        /* START SCREEN */
        /* #start-screen {
            background: radial-gradient(circle, #fff9e6 0%, #ffe0b3 100%);
        } */

        /* START SCREEN */
        #start-screen {
            background-image: url('assets/start_background_gpt.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        h1 {
            font-size: 3rem;
            color: var(--primary-orange);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: scale(1.05);
            background-color: #e68a00;
        }

        /* GAMEPLAY SCREEN */
        /* #gameplay-screen {
            background: linear-gradient(to bottom, #fdfbfb 0%, #ebedee 100%);
            justify-content: flex-start;
            padding-top: 20px;
        } */

        /* GAMEPLAY SCREEN */
        #gameplay-screen {
            background-image: url('assets/kitchen-image-2.png');
            /* Yahan kitchen wali image ka link daalein */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            justify-content: flex-start;
            padding-top: 20px;
        }

        #timer {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            background: white;
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .game-area {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 80vh;
            margin: 0 auto;
        }

        .pot-container {
            position: absolute;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            z-index: 5;
        }

        .pot-img {
            width: 100%;
            height: auto;
            transition: opacity 0.3s;
        }

        .ingredients-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .ingredient {
            position: absolute;
            width: 80px;
            height: 80px;
            cursor: pointer;
            transition: transform 0.3s ease;
            animation: bobbing 3s ease-in-out infinite;
            z-index: 10;
        }

        .ingredient img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .ingredient:hover {
            transform: scale(1.1) rotate(0deg) !important;
            animation-play-state: paused;
        }

        /* ANIMATIONS */
        @keyframes bobbing {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        @keyframes sparkle {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .shake-anim {
            animation: shake 0.3s ease-in-out 2;
        }

        .sparkle-effect {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fff 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            animation: sparkle 0.6s forwards;
        }

        .wrong-x {
            position: absolute;
            width: 50px;
            height: 50px;
            pointer-events: none;
            z-index: 30;
            display: none;
        }

        .feedback-msg {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4d4d;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
            z-index: 100;
        }

        /* END SCREENS */
        .end-img {
            max-width: 400px;
            width: 80%;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <h1>Let's make Kheer for Ganesha</h1>
        <p class="subtitle">Selet the right ingredients for the kheer...</p>
        <p class="subtitle">Before the timer runs out!!</p>
        <button class="btn" onclick="startGame()">Start Cooking</button>
    </div>

    <!-- Gameplay Screen -->
    <div id="gameplay-screen" class="screen">
        <div id="timer">01:00</div>
        <div class="feedback-msg" id="msg">Oh no! That doesn't go in kheer!</div>

        <div class="game-area">
            <div class="ingredients-container" id="ingredients-box">
                <!-- Ingredients will be generated here -->
            </div>

            <div class="pot-container">
                <img src="assets/pot_empty.png" id="pot-img" class="pot-img" alt="Pot">
            </div>
        </div>

        <!-- Hidden X icon template -->
        <img src="assets/wrong_x.png" id="wrong-x-icon" class="wrong-x" alt="Wrong">
    </div>

    <!-- Win Screen -->
    <div id="win-screen" class="screen">
        <img src="assets/ganesha_happy.png" class="end-img" alt="Ganesha Happy">
        <button class="btn" onclick="location.reload()">Play Again</button>
    </div>

    <!-- Lose Screen -->
    <div id="lose-screen" class="screen">
        <img src="assets/ganesha_sad.png" class="end-img" alt="Ganesha Sad">
        <button class="btn" onclick="location.reload()">Try Again</button>
    </div>

    <script>
        const potStages = [
            'assets/pot_empty.png',
            'assets/pot_milk.png',
            'assets/pot_rice.png',
            'assets/pot_jaggery.png',
            'assets/pot_kheer_done.png'
        ];

        const ingredientsData = [
            { name: 'milk', type: 'correct', img: 'assets/milk.png' },
            { name: 'rice', type: 'correct', img: 'assets/rice.png' },
            { name: 'jaggery', type: 'correct', img: 'assets/jaggery.png' },
            { name: 'dryfruits', type: 'correct', img: 'assets/dryfruits.png' },
            { name: 'salt', type: 'wrong', img: 'assets/salt.png' },
            { name: 'chillies', type: 'wrong', img: 'assets/chillies.png' },
            { name: 'onion', type: 'wrong', img: 'assets/onion.png' },
            { name: 'cheese', type: 'wrong', img: 'assets/cheese.png' },
            { name: 'tomato', type: 'wrong', img: 'assets/tomato.png' },
            { name: 'potatoes', type: 'wrong', img: 'assets/potatoes.png' }
        ];

        let timeLeft = 60;
        let timerInterval;
        let correctAdded = 0;
        let gameActive = false;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startGame() {
            showScreen('gameplay-screen');
            gameActive = true;
            setupIngredients();
            startTimer();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('timer').textContent =
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                if (timeLeft <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        function setupIngredients() {
            const container = document.getElementById('ingredients-box');
            // Randomize order
            const shuffled = [...ingredientsData].sort(() => Math.random() - 0.5);

            shuffled.forEach((ing, index) => {
                const div = document.createElement('div');
                div.className = 'ingredient';

                // Elliptical layout logic: x = a cos t, y = b sin t
                // We add some randomness to make it "loose"
                const angle = (index / ingredientsData.length) * Math.PI * 2;
                const rx = 350 + (Math.random() * 40 - 20); // semi-major axis
                const ry = 180 + (Math.random() * 40 - 20); // semi-minor axis

                const centerX = 450;
                const centerY = 250;

                const left = centerX + rx * Math.cos(angle) - 40;
                const top = centerY + ry * Math.sin(angle) - 40;

                const rotation = Math.floor(Math.random() * 20) - 10; // -10 to +10 deg
                const delay = Math.random() * 2; // for bobbing sync

                div.style.left = `${left}px`;
                div.style.top = `${top}px`;
                div.style.transform = `rotate(${rotation}deg)`;
                div.style.animationDelay = `${delay}s`;

                const img = document.createElement('img');
                img.src = ing.img;
                div.appendChild(img);

                div.onclick = () => handleIngredientClick(div, ing);
                container.appendChild(div);
            });
        }

        function handleIngredientClick(el, data) {
            if (!gameActive) return;

            if (data.type === 'correct') {
                el.style.pointerEvents = 'none';
                el.style.transition = 'all 0.8s cubic-bezier(0.5, -0.5, 1, 1)';

                // Animate to pot
                const pot = document.querySelector('.pot-container');
                const potRect = pot.getBoundingClientRect();
                const areaRect = document.getElementById('ingredients-box').getBoundingClientRect();

                const targetX = potRect.left + potRect.width / 2 - areaRect.left - 40;
                const targetY = potRect.top + 10 - areaRect.top;

                el.style.left = targetX + 'px';
                el.style.top = targetY + 'px';
                el.style.opacity = '0';
                el.style.transform = 'scale(0.2) rotate(360deg)';

                setTimeout(() => {
                    correctAdded++;
                    updatePot();
                    createSparkle(potRect.left + potRect.width / 2, potRect.top + 50);
                    if (correctAdded === 4) {
                        setTimeout(() => endGame(true), 1000);
                    }
                }, 800);

            } else {
                // Wrong ingredient
                el.classList.add('shake-anim');
                const xIcon = document.getElementById('wrong-x-icon');
                const rect = el.getBoundingClientRect();

                xIcon.style.left = (rect.left + 15) + 'px';
                xIcon.style.top = (rect.top - 40) + 'px';
                xIcon.style.display = 'block';

                const msg = document.getElementById('msg');
                msg.style.display = 'block';

                setTimeout(() => {
                    el.classList.remove('shake-anim');
                    xIcon.style.display = 'none';
                    msg.style.display = 'none';
                }, 1500);
            }
        }

        function updatePot() {
            const potImg = document.getElementById('pot-img');
            potImg.src = potStages[correctAdded];
        }

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle-effect';
            sparkle.style.left = (x - 50) + 'px';
            sparkle.style.top = (y - 50) + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 600);
        }

        function endGame(win) {
            gameActive = false;
            clearInterval(timerInterval);
            if (win) {
                showScreen('win-screen');
            } else {
                showScreen('lose-screen');
            }
        }
    </script>
</body>

</html>
