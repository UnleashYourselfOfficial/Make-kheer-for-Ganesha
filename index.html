<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <title>Make Kheer for Ganesha</title>
    <style>
        :root {
            --primary-orange: #ff9933;
            --primary-yellow: #ffcc00;
            --white: #ffffff;
            --text-color: #4a4a4a;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Fredoka One', cursive;
            /* font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; */
            overflow: hidden;
            background-color: #fff9e6;
        }

        /* Update the .screen class to ensure centering */
        .screen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
            /* Add a subtle background pattern if you like, or keep it clean */
            background-image: radial-gradient(#ffcc0033 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Add this new class for the "Rectangle" container */
        .content-card {
            background: rgba(255, 255, 255, 0.7);
            /* White with 90% opacity */
            padding: 40px;
            border-radius: 30px;
            border: 5px solid var(--primary-orange);
            /* box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); */
            max-width: 80%;
            backdrop-filter: blur(5px);
            /* Blurs the background behind the card */
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.25);
        }

        /* Style the headings to pop */
        /* h1 {
            color: var(--primary-orange);
            text-shadow: 2px 2px 0px var(--primary-yellow);
            margin-bottom: 20px;
        } */

        .active {
            display: flex;
        }

        /* START SCREEN */
        /* #start-screen {
            background: radial-gradient(circle, #fff9e6 0%, #ffe0b3 100%);
        } */

        /* START SCREEN */
        #start-screen {
            background-image: url('assets/start_background_2.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* h1 {
            font-size: 3rem;
            color: var(--primary-orange);
            text-shadow:
                -2px -2px 0 #ffffff,
                2px -2px 0 #ffffff,
                -2px 2px 0 #ffffff,
                2px 2px 0 #ffffff,
                4px 4px 0 #cc6f00,
                8px 8px 16px rgba(0, 0, 0, 0.4);
        } */


        h1 {
            font-size: 3.2rem;
            /* Slightly larger for more impact */
            color: var(--primary-orange);
            text-shadow: 3px 3px 0px var(--white),
                -3px -3px 0px var(--white),
                3px -3px 0px var(--white),
                -3px 3px 0px var(--white),
                0 0 10px rgba(0, 0, 0, 0.3);
            /* Adds a subtle dark outline and softer glow */
            margin-bottom: 20px;
            /* Consistent margin */
            line-height: 1.1;
            /* Improves readability for multi-line titles */
        }


        /* .subtitle {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 30px;
        } */

        .subtitle {
            font-size: 1.4rem;
            color: #555;
            margin-bottom: 15px;
            line-height: 1;
        }

        .subtitle-container {
            margin-top: 15px;
            margin-bottom: 25px;
        }

        /* .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        } */

        /* .btn {
            padding: 18px 48px;
            font-size: 1.6rem;
            background: linear-gradient(180deg, #ffb347 0%, #ff8c1a 100%);
            color: white;
            border: 4px solid #ffffff;
            border-radius: 60px;
            cursor: pointer;

            box-shadow:
                0 6px 0 #cc6f00,
                0 10px 20px rgba(0, 0, 0, 0.25);

            transition: transform 0.1s;
            animation: pulse 2s infinite;
        } */

        .btn {
            padding: 18px 48px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.6rem;
            background: linear-gradient(180deg, #ffb347 0%, #ff8c1a 100%);
            color: white;
            border: 4px solid #ffffff;
            border-radius: 60px;
            cursor: pointer;

            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 3px 0 #cc6f00;

            box-shadow:
                0 6px 0 #cc6f00,
                0 10px 20px rgba(0, 0, 0, 0.25);

            transition: transform 0.1s;
            animation: pulse 2s infinite;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow:
                0 2px 0 #cc6f00,
                0 6px 10px rgba(0, 0, 0, 0.25);
        }

        .btn:hover {
            transform: scale(1.05);
            background-color: #e68a00;
        }

        /* GAMEPLAY SCREEN */
        /* #gameplay-screen {
            background: linear-gradient(to bottom, #fdfbfb 0%, #ebedee 100%);
            justify-content: flex-start;
            padding-top: 20px;
        } */

        /* GAMEPLAY SCREEN */
        #gameplay-screen {
            background-image: url('assets/kitchen.png');
            /* Yahan kitchen wali image ka link daalein */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            justify-content: flex-start;
            padding-top: 20px;
        }

        #timer {
            left: 12px;
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            background: white;
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }


        /* #timer {
            position: absolute;
            top: 200px;
            left: 80px; 

            font-size: 2.2rem;
            font-weight: bold;

            color: #333;
            background: white;

            padding: 8px 24px;
            border-radius: 30px;

            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);

            z-index: 20;
        } */

        .game-area {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 80vh;
            margin: 0 auto;
        }

        .pot-container {
            position: absolute;
            bottom: 0.5%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            z-index: 5;
        }

        .pot-img {
            width: 100%;
            height: auto;
            transition: opacity 0.3s;
        }

        /* .ingredients-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        } */



        .ingredient {
            position: absolute;
            width: 110px;
            height: 110px;
            cursor: pointer;
            transition: transform 0.3s ease;
            animation: bobbing 3s ease-in-out infinite;
            z-index: 10;
        }

        .ingredient.invisible {
            opacity: 0;
            pointer-events: none;
        }


        .ingredient img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(3px 0 0 white) drop-shadow(-3px 0 0 white) drop-shadow(0 3px 0 white) drop-shadow(0 -3px 0 white);
        }

        .ingredient:hover {
            animation-play-state: paused;
            transform: scale(1.1) rotate(0deg) !important;
        }

        /* ANIMATIONS */
        @keyframes bobbing {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        @keyframes sparkle {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        .shake-anim {
            animation: shake 0.3s ease-in-out 2;
        }

        .sparkle-effect {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fff 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            animation: sparkle 0.6s forwards;
        }

        .wrong-x {
            position: absolute;
            width: 50px;
            height: 50px;
            pointer-events: none;
            z-index: 30;
            display: none;
        }

        .feedback-msg {
            position: absolute;
            top: 300px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4d4d;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: normal;
            font-size: 1.4rem;
            border: 3px solid #cc0000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 100;
            white-space: nowrap;
        }

        #instruction {
            position: absolute;
            top: 50px;
            left: 50%;

            transform: translateX(-50%);

            font-size: 1.6rem;
            color: #ffffff;

            padding: 8px 24px;

            background: rgba(0, 0, 0, 0.35);
            border-radius: 20px;

            backdrop-filter: blur(4px);

            z-index: 20;
        }

        /* END SCREENS */

        .end-img {
            max-width: 400px;
            width: 80%;
            margin-bottom: 20px;

            filter: drop-shadow(0 10px 25px rgba(255, 255, 255, 0.25));
        }

        #win-screen {
            background:
                radial-gradient(circle at center, #fff7cc 0%, #ffd966 40%, #ffb84d 75%, #ff9933 100%);
        }

        #lose-screen {
            background:
                radial-gradient(circle at center, #e6f0ff 0%, #cce0ff 40%, #b3ccff 75%, #99b3ff 100%);
        }
    </style>
</head>

<body>

    <audio id="s_click" src="assets/FingerSnap.mp3" preload="auto"></audio>
    <audio id="s_correct" src="assets/correct.mp3" preload="auto"></audio>
    <audio id="s_wrong" src="assets/error.mp3" preload="auto"></audio>
    <audio id="s_win" src="assets/cheer.mp3" preload="auto"></audio>
    <audio id="s_lose" src="assets/lose.mp3" preload="auto"></audio>
    <audio id="bg_music" src="assets/VideoGame2.mp3" loop></audio>

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <div class="content-card">
            <h1>Let’s Make Kheer for Ganesha</h1>
            <div class="subtitle-container">
                <p class="subtitle">Pick the RIGHT ingredients for the kheer...</p>
                <p class="subtitle">Before time runs out!!</p>
            </div>
            <button class="btn" onclick="playSound('s_click');startGame()">
                START
            </button>
        </div>
    </div>

    <!-- Gameplay Screen -->
    <div id="gameplay-screen" class="screen">
        <div id="timer">01 : 00</div>

        <div class="feedback-msg" id="msg">Oh no! That doesn't go in kheer!</div>

        <div class="game-area">
            <div class="ingredients-container" id="ingredients-box">
                <!-- Ingredients will be generated here -->
            </div>

            <div class="pot-container">
                <img src="assets/pot_empty.png" id="pot-img" class="pot-img" alt="Pot">
            </div>

            <div id="instruction">
                Click the correct ingredients to make kheer!
            </div>
        </div>

        <!-- Hidden X icon template -->
        <img src="assets/wrong_x.png" id="wrong-x-icon" class="wrong-x" alt="Wrong">
    </div>

    <!-- Win Screen -->
    <div id="win-screen" class="screen">
        <img src="assets/ganesha_happy.png" class="end-img" alt="Ganesha Happy">
    </div>

    <!-- Lose Screen -->
    <div id="lose-screen" class="screen">
        <img src="assets/ganesha_sad.png" class="end-img" alt="Ganesha Sad">
    </div>

    <script>


        const potStages = [
            'assets/pot_empty.png',
            'assets/pot_milk.png',
            'assets/pot_rice.png',
            'assets/pot_jaggery.png',
            'assets/pot_kheer_done.png'
        ];

        const ingredientsData = [
            { name: 'milk', type: 'correct', img: 'assets/milk.png' },
            { name: 'rice', type: 'correct', img: 'assets/rice.png' },
            { name: 'jaggery', type: 'correct', img: 'assets/jaggery.png' },
            { name: 'dryfruits', type: 'correct', img: 'assets/dryfruits.png' },
            { name: 'salt', type: 'wrong', img: 'assets/salt.png' },
            { name: 'chillies', type: 'wrong', img: 'assets/chillies.png' },
            { name: 'onion', type: 'wrong', img: 'assets/onion.png' },
            { name: 'cheese', type: 'wrong', img: 'assets/cheese.png' },
            { name: 'tomato', type: 'wrong', img: 'assets/tomato.png' },
            { name: 'potatoes', type: 'wrong', img: 'assets/potatoes.png' }

        ];

        let timeLeft = 60;
        let timerInterval;
        let correctAdded = 0;
        let gameActive = false;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function playSound(id) {

            const s = document.getElementById(id);
            if (!s) return;

            s.pause();
            s.currentTime = 0;

            s.play().catch(() => { });
        }

        function startGame() {

            playSound('s_click');

            const bg = document.getElementById("bg_music");
            bg.volume = 0.35;
            bg.play();

            showScreen('gameplay-screen');
            gameActive = true;
            setupIngredients();
            startTimer();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('timer').textContent =
                    `${mins.toString().padStart(2, '0')} : ${secs.toString().padStart(2, '0')}`;

                if (timeLeft <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        function setupIngredients() {

            const container = document.getElementById('ingredients-box');
            container.innerHTML = "";

            const shuffled = [...ingredientsData].sort(() => Math.random() - 0.5);

            const leftSide = shuffled.slice(0, 5);
            const rightSide = shuffled.slice(5, 10);

            const topY = 330;     // push downward
            const bottomY = 450;  // push downward


            const gap = 130;

            // ---------- LEFT SIDE ----------

            leftSide.forEach((ing, i) => {

                const div = document.createElement("div");
                div.className = "ingredient";

                let left;

                if (i < 3) {
                    left = -120 + (i * gap);   // push whole top row further left
                    div.style.top = `${topY}px`;
                }
                else {
                    left = -55 + ((i - 3) * gap);
                    div.style.top = `${bottomY}px`;
                }

                div.style.left = `${left}px`;

                const img = document.createElement("img");
                img.src = ing.img;

                div.appendChild(img);
                div.onclick = () => handleIngredientClick(div, ing);

                container.appendChild(div);

            });


            // ---------- RIGHT SIDE ----------

            rightSide.forEach((ing, i) => {

                const div = document.createElement("div");
                div.className = "ingredient";

                let left;

                if (i < 3) {
                    left = 650 + (i * gap);
                    div.style.top = `${topY}px`;
                }
                else {
                    left = 715 + ((i - 3) * gap);
                    div.style.top = `${bottomY}px`;
                }

                div.style.left = `${left}px`;

                const img = document.createElement("img");
                img.src = ing.img;

                div.appendChild(img);
                div.onclick = () => handleIngredientClick(div, ing);

                container.appendChild(div);

            });

        }

        function handleIngredientClick(el, data) {
            if (!gameActive) return;

            if (data.type === 'correct') {
                playSound('s_correct');
                el.style.pointerEvents = 'none';
                el.style.transition = 'all 0.8s cubic-bezier(0.5, -0.5, 1, 1)';

                // Animate to pot
                const pot = document.querySelector('.pot-container');
                const potRect = pot.getBoundingClientRect();
                const areaRect = document.getElementById('ingredients-box').getBoundingClientRect();

                const targetX = potRect.left + potRect.width / 2 - areaRect.left - 40;
                const targetY = potRect.top + 10 - areaRect.top;

                el.style.left = targetX + 'px';
                el.style.top = targetY + 'px';
                el.style.opacity = '0';
                el.style.transform = 'scale(0.2) rotate(360deg)';

                setTimeout(() => {
                    correctAdded++;
                    updatePot();
                    createSparkle(potRect.left + potRect.width / 2, potRect.top + 50);
                    if (correctAdded === 4) {
                        setTimeout(() => endGame(true), 1000);
                    }
                }, 800);

            } else {
                // Wrong ingredient
                playSound('s_wrong');
                el.classList.add('shake-anim');
                const xIcon = document.getElementById('wrong-x-icon');
                const rect = el.getBoundingClientRect();

                xIcon.style.left = (rect.left + 15) + 'px';
                xIcon.style.top = (rect.top - 40) + 'px';
                xIcon.style.display = 'block';

                const msg = document.getElementById('msg');
                msg.style.display = 'block';

                setTimeout(() => {
                    el.classList.remove('shake-anim');
                    xIcon.style.display = 'none';
                    msg.style.display = 'none';
                }, 1500);
            }
        }

        function updatePot() {
            const potImg = document.getElementById('pot-img');
            potImg.src = potStages[correctAdded];
        }

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle-effect';
            sparkle.style.left = (x - 50) + 'px';
            sparkle.style.top = (y - 50) + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 600);
        }

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        function makeItRain() {

            var end = Date.now() + (2 * 1000);

            const colors = [
                '#ff4d4d',   // bright red
                '#0066ff',   // blue
                '#00cc66',   // green
                '#ff66cc',   // pink
                '#ffffff',   // white
                '#6633ff'    // purple
            ];

            function frame() {

                confetti({
                    particleCount: 2,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors,
                    scalar: 1.3
                });

                confetti({
                    particleCount: 2,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }

            frame();
        }

        function endGame(win) {

            gameActive = false;
            clearInterval(timerInterval);

            const bg = document.getElementById("bg_music");
            bg.pause();
            bg.currentTime = 0;

            if (win) {

                showScreen('win-screen');

                setTimeout(() => {
                    playSound('s_win');
                }, 150);

                setTimeout(makeItRain, 300);

            } else {

                showScreen('lose-screen');

                setTimeout(() => {
                    playSound('s_lose');
                }, 150);

            }
        }
    </script>
</body>

</html>
